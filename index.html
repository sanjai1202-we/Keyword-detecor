<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
<title>SDN AR Scanner</title>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:Arial,sans-serif;}

#camera{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;z-index:1;}
#ocr-canvas{display:none;}

/* Scan box */
#scan-box{
  position:fixed;top:50%;left:50%;
  transform:translate(-50%,-55%);
  width:88vw;height:42vw;max-width:360px;max-height:200px;
  z-index:10;pointer-events:none;
}
#scan-box .c{position:absolute;width:24px;height:24px;border-color:#4facfe;border-style:solid;}
#scan-box .tl{top:0;left:0;border-width:4px 0 0 4px;border-radius:6px 0 0 0;}
#scan-box .tr{top:0;right:0;border-width:4px 4px 0 0;border-radius:0 6px 0 0;}
#scan-box .bl{bottom:0;left:0;border-width:0 0 4px 4px;border-radius:0 0 0 6px;}
#scan-box .br{bottom:0;right:0;border-width:0 4px 4px 0;border-radius:0 0 6px 0;}
#scan-line{
  position:absolute;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,#4facfe,transparent);
  box-shadow:0 0 6px #4facfe;
  animation:sw 2s ease-in-out infinite;
}
@keyframes sw{0%{top:0}50%{top:calc(100% - 2px)}100%{top:0}}

/* Bottom UI */
#bottom-ui{
  position:fixed;bottom:0;left:0;right:0;z-index:20;
  padding:12px 16px 24px;
  display:flex;flex-direction:column;align-items:center;gap:8px;
  pointer-events:none;
}
#pills{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;max-width:340px;}
.pill{
  background:rgba(0,0,0,0.75);border:1px solid #2a2a2a;
  border-radius:20px;padding:4px 10px;
  font-size:0.68rem;color:#555;transition:all 0.4s;
}
.pill.lit{border-color:#00e676;color:#00e676;background:rgba(0,230,118,0.1);box-shadow:0 0 8px rgba(0,230,118,0.25);}
#status{
  background:rgba(0,0,0,0.8);border:1.5px solid #4facfe;
  border-radius:24px;padding:9px 20px;
  color:#4facfe;font-size:0.82rem;text-align:center;
  max-width:300px;width:100%;transition:all 0.3s;
}
#status.found{border-color:#00e676;color:#00e676;}
#status.reading{border-color:#ff9800;color:#ff9800;}

/* Top label */
#top-label{
  position:fixed;top:16px;left:0;right:0;z-index:20;
  text-align:center;pointer-events:none;
}
#top-label span{
  background:rgba(0,0,0,0.75);
  color:#fff;font-size:0.78rem;
  padding:6px 16px;border-radius:20px;
  letter-spacing:0.5px;
}

/* Loading */
#loading{
  position:fixed;inset:0;background:#000;z-index:9999;
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:16px;padding:30px;text-align:center;
}
#loading h2{color:#4facfe;font-size:1.15rem;}
#loading p{color:#777;font-size:0.82rem;line-height:1.6;}
#lbar-wrap{width:220px;height:8px;background:#1a1a1a;border-radius:4px;overflow:hidden;}
#lbar{height:100%;width:0%;background:linear-gradient(90deg,#4facfe,#00e676);border-radius:4px;transition:width 0.5s;}
#lmsg{color:#aaa;font-size:0.8rem;min-height:18px;}

/* Video player */
#vscreen{
  display:none;position:fixed;inset:0;background:#000;z-index:100;
  flex-direction:column;align-items:center;justify-content:center;
}
#mvid{width:100%;height:100%;object-fit:contain;}
#vclose{
  position:fixed;top:14px;right:14px;z-index:110;
  background:rgba(0,0,0,0.8);color:#fff;
  border:2px solid rgba(255,255,255,0.4);
  border-radius:50%;width:42px;height:42px;
  font-size:1.1rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;pointer-events:all;
}
#vreplay{
  position:fixed;bottom:28px;left:50%;transform:translateX(-50%);z-index:110;
  background:rgba(0,0,0,0.85);color:#4facfe;
  border:1.5px solid #4facfe;border-radius:24px;
  padding:10px 24px;font-size:0.88rem;cursor:pointer;pointer-events:all;
}
</style>
</head>
<body>

<!-- Loading -->
<div id="loading">
  <h2>📖 SDN AR Scanner</h2>
  <div id="lbar-wrap"><div id="lbar"></div></div>
  <div id="lmsg">Starting...</div>
  <p>Point your camera at the<br><strong style="color:#fff">SDN Controllers</strong> page<br>in your textbook</p>
</div>

<!-- Camera -->
<video id="camera" autoplay playsinline muted></video>
<canvas id="ocr-canvas"></canvas>

<!-- Top label -->
<div id="top-label"><span>📖 SDN Controllers — Section 2.5</span></div>

<!-- Scan box -->
<div id="scan-box">
  <div class="c tl"></div><div class="c tr"></div>
  <div class="c bl"></div><div class="c br"></div>
  <div id="scan-line"></div>
</div>

<!-- Bottom UI -->
<div id="bottom-ui">
  <div id="pills">
    <span class="pill" id="p0">End-user Discovery</span>
    <span class="pill" id="p1">Network Discovery</span>
    <span class="pill" id="p2">Topology Mgmt</span>
    <span class="pill" id="p3">Flow Management</span>
    <span class="pill" id="p4">SDN Controller</span>
    <span class="pill" id="p5">OpenFlow</span>
  </div>
  <div id="status">📷 Point camera at textbook page</div>
</div>

<!-- Video -->
<div id="vscreen">
  <video id="mvid" src="./video.mp4" playsinline webkit-playsinline></video>
  <button id="vclose" onclick="closeVid()">✕</button>
  <button id="vreplay" onclick="replayVid()">🔁 Replay</button>
</div>

<script>
// ── Config ─────────────────────────────────────────────
// Keywords: detecting ANY 2 of these triggers the video
const KEYWORDS = [
  {text:'end-user',   pill:'p0'},
  {text:'end user',   pill:'p0'},
  {text:'network device', pill:'p1'},
  {text:'device discovery', pill:'p1'},
  {text:'topology',   pill:'p2'},
  {text:'flow management', pill:'p3'},
  {text:'sdn controller', pill:'p4'},
  {text:'sdn',        pill:'p4'},
  {text:'openflow',   pill:'p5'},
  {text:'northbound', pill:'p4'},
  {text:'southbound', pill:'p4'},
];
const TRIGGER_COUNT = 2; // keywords needed to trigger video

// ── Elements ───────────────────────────────────────────
const lbar   = document.getElementById('lbar');
const lmsg   = document.getElementById('lmsg');
const loading= document.getElementById('loading');
const status = document.getElementById('status');
const cam    = document.getElementById('camera');
const canvas = document.getElementById('ocr-canvas');
const ctx    = canvas.getContext('2d');
const vscreen= document.getElementById('vscreen');
const mvid   = document.getElementById('mvid');

let worker=null, scanLoop=null, busy=false, playing=false, cooldown=false;

// ── Step 1: Camera ─────────────────────────────────────
async function startCam(){
  lmsg.textContent='Requesting camera...'; lbar.style.width='15%';
  try{
    const stream = await navigator.mediaDevices.getUserMedia({
      video:{facingMode:'environment',width:{ideal:1280},height:{ideal:720}},audio:false
    });
    cam.srcObject = stream;
    await new Promise(r=>{ cam.onloadedmetadata=r; });
    lbar.style.width='35%'; lmsg.textContent='Camera ready ✅';
    return true;
  }catch(e){
    lmsg.textContent='❌ Camera error: '+e.message;
    return false;
  }
}

// ── Step 2: Tesseract ──────────────────────────────────
async function startOCR(){
  lmsg.textContent='Loading OCR engine...'; lbar.style.width='45%';
  try{
    worker = await Tesseract.createWorker('eng',1,{
      logger:m=>{
        if(m.status==='loading tesseract core'){lbar.style.width='55%';lmsg.textContent='Loading core...';}
        if(m.status==='loading language traineddata'){lbar.style.width='70%';lmsg.textContent='Loading English data...';}
        if(m.status==='initialized api'){lbar.style.width='88%';lmsg.textContent='Almost ready...';}
      }
    });
    await worker.setParameters({tessedit_pageseg_mode:'6'});
    return true;
  }catch(e){
    lmsg.textContent='❌ OCR error: '+e.message; return false;
  }
}

// ── Init ───────────────────────────────────────────────
async function init(){
  if(!await startCam()) return;
  if(!await startOCR()) return;
  lbar.style.width='100%'; lmsg.textContent='✅ Ready!';
  setTimeout(()=>{ loading.style.display='none'; startScanning(); }, 700);
}

// ── Capture & enhance frame ────────────────────────────
function capture(){
  const W=cam.videoWidth, H=cam.videoHeight;
  if(!W||!H) return null;
  // Crop middle 85% width, middle 50% height
  const cx=W*0.075, cy=H*0.20, cw=W*0.85, ch=H*0.50;
  canvas.width=Math.floor(cw); canvas.height=Math.floor(ch);
  ctx.drawImage(cam, cx,cy,cw,ch, 0,0,cw,ch);
  // Grayscale + contrast boost for better OCR
  const id=ctx.getImageData(0,0,canvas.width,canvas.height), d=id.data;
  for(let i=0;i<d.length;i+=4){
    const g=0.299*d[i]+0.587*d[i+1]+0.114*d[i+2];
    const c=g>128?Math.min(255,g*1.4):Math.max(0,g*0.6);
    d[i]=d[i+1]=d[i+2]=c;
  }
  ctx.putImageData(id,0,0);
  return canvas;
}

// ── Check keywords in OCR text ─────────────────────────
function check(text){
  const lower=text.toLowerCase();
  const matched=new Set();
  const litPills=new Set();

  KEYWORDS.forEach(kw=>{
    if(lower.includes(kw.text)){
      matched.add(kw.text);
      litPills.add(kw.pill);
    }
  });

  // Update pill UI
  document.querySelectorAll('.pill').forEach(p=>p.classList.remove('lit'));
  litPills.forEach(id=>{ const el=document.getElementById(id); if(el)el.classList.add('lit'); });

  return matched.size >= TRIGGER_COUNT;
}

// ── Scan loop ──────────────────────────────────────────
function startScanning(){
  const run=async()=>{
    if(busy||playing||cooldown) return;
    busy=true;
    status.textContent='🔍 Reading text...';
    status.className='reading';
    try{
      const frame=capture();
      if(frame){
        const res=await worker.recognize(frame);
        const text=res.data.text;
        if(check(text)){
          status.textContent='✅ Page detected!';
          status.className='found';
          cooldown=true;
          setTimeout(playVid, 600);
        } else {
          status.textContent='📷 Point camera at textbook page';
          status.className='';
        }
      }
    }catch(e){ console.error(e); }
    busy=false;
  };
  run();
  scanLoop=setInterval(run, 2500);
}

// ── Video ──────────────────────────────────────────────
function playVid(){
  playing=true;
  vscreen.style.display='flex';
  mvid.currentTime=0;
  mvid.play().catch(()=>{});
}
function closeVid(){
  mvid.pause();
  vscreen.style.display='none';
  playing=false; cooldown=false;
  document.querySelectorAll('.pill').forEach(p=>p.classList.remove('lit'));
  status.textContent='📷 Point camera at textbook page';
  status.className='';
}
function replayVid(){ mvid.currentTime=0; mvid.play().catch(()=>{}); }

init();
</script>
</body>
</html>
