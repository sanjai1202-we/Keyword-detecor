<!DOCTYPE html>
<html>
<head>
  <title>SDN Scanner</title>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
  <style>
    body { text-align:center; font-family: Arial; }
    video { margin-top:20px; }
    button, select { padding:8px; margin:5px; }
  </style>
</head>
<body>

<h2>Scan SDN Page</h2>

<video id="camera" width="300" autoplay></video>
<br>
<button onclick="captureAndScan()">Scan Page</button>

<br><br>

<video id="videoPlayer" width="600">
  <source id="videoSource" src="" type="video/mp4">
</video>

<br>
<button onclick="playVideo()">Play</button>
<button onclick="pauseVideo()">Pause</button>
<button onclick="forward10()">+10s</button>

<select onchange="changeSpeed(this.value)">
  <option value="0.5">0.5x</option>
  <option value="1" selected>1x</option>
  <option value="1.5">1.5x</option>
  <option value="2">2x</option>
</select>

<script>

// 🎥 Start Camera
const camera = document.getElementById("camera");

navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
.then(stream => {
  camera.srcObject = stream;
});

// 🎯 Strong Keyword Grouping
const topics = {
  sdn_controller: {
    keywords: ["sdn", "controller", "northbound", "southbound", "openflow", "flow management", "topology", "device discovery"],
    video: "sdn_controller.mp4"
  }
};

const videoPlayer = document.getElementById("videoPlayer");
const videoSource = document.getElementById("videoSource");

function captureAndScan() {

  const canvas = document.createElement("canvas");
  canvas.width = camera.videoWidth;
  canvas.height = camera.videoHeight;

  const ctx = canvas.getContext("2d");
  ctx.drawImage(camera, 0, 0);

  Tesseract.recognize(canvas, 'eng')
  .then(result => {

    let text = result.data.text.toLowerCase();
    console.log("Scanned Text:", text);

    detectTopic(text);

  });
}

function detectTopic(text) {

  let detectedTopic = null;
  let highestMatch = 0;

  for (let topic in topics) {

    let matchCount = 0;

    topics[topic].keywords.forEach(word => {
      if (text.includes(word)) {
        matchCount++;
      }
    });

    if (matchCount >= 3 && matchCount > highestMatch) {
      highestMatch = matchCount;
      detectedTopic = topic;
    }
  }

  if (detectedTopic) {
    videoSource.src = topics[detectedTopic].video;
    videoPlayer.load();
    videoPlayer.play();
    alert("SDN Topic Detected!");
  } else {
    alert("No strong match detected.");
  }
}

// 🎮 Video Controls
function playVideo() { videoPlayer.play(); }
function pauseVideo() { videoPlayer.pause(); }
function forward10() { videoPlayer.currentTime += 10; }
function changeSpeed(speed) { videoPlayer.playbackRate = speed; }

</script>

</body>
</html>
