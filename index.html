<!DOCTYPE html>
<html>
<head>
  <title>SDN Keyword Video Controller</title>
  <style>
    body { font-family: Arial; text-align: center; margin-top: 40px; }
    video { margin-top: 20px; }
    button, select { margin: 5px; padding: 8px; }
  </style>
</head>
<body>

<h2>SDN Topic Detector</h2>

<input type="text" id="userInput" placeholder="Type topic here..." size="50">
<button onclick="checkTopic()">Detect Topic</button>

<br><br>

<video id="videoPlayer" width="600">
  <source id="videoSource" src="" type="video/mp4">
</video>

<br>

<button onclick="playVideo()">Play</button>
<button onclick="pauseVideo()">Pause</button>
<button onclick="forward10()">+10s</button>

<select onchange="changeSpeed(this.value)">
  <option value="0.5">0.5x</option>
  <option value="1" selected>1x</option>
  <option value="1.5">1.5x</option>
  <option value="2">2x</option>
</select>

<script>

// 🎯 STRONG KEYWORD GROUPING
const topics = {
  sdn_controller: {
    keywords: [
      "sdn",
      "controller",
      "northbound",
      "southbound",
      "openflow",
      "flow management",
      "topology",
      "device discovery",
      "network device",
      "control plane"
    ],
    video: "sdn_controller.mp4"
  },

  flow_management: {
    keywords: [
      "flow",
      "flow table",
      "flow management",
      "packet",
      "database",
      "synchronization"
    ],
    video: "flow_video.mp4"
  },

  topology: {
    keywords: [
      "topology",
      "interconnection",
      "network topology",
      "router",
      "switch",
      "wireless access point"
    ],
    video: "topology_video.mp4"
  }
};

const videoPlayer = document.getElementById("videoPlayer");
const videoSource = document.getElementById("videoSource");

function checkTopic() {

  let text = document.getElementById("userInput").value.toLowerCase().trim();

  let detectedTopic = null;
  let highestMatch = 0;

  for (let topic in topics) {

    let matchCount = 0;

    topics[topic].keywords.forEach(word => {
      if (text.includes(word)) {
        matchCount++;
      }
    });

    // 🔥 STRONG THRESHOLD RULE
    if (matchCount >= 3 && matchCount > highestMatch) {
      highestMatch = matchCount;
      detectedTopic = topic;
    }
  }

  if (detectedTopic) {
    videoSource.src = topics[detectedTopic].video;
    videoPlayer.load();
    videoPlayer.play();
    alert("Detected: " + detectedTopic);
  } else {
    alert("No strong topic match detected");
  }
}

// 🎮 Video Controls

function playVideo() {
  videoPlayer.play();
}

function pauseVideo() {
  videoPlayer.pause();
}

function forward10() {
  videoPlayer.currentTime += 10;
}

function changeSpeed(speed) {
  videoPlayer.playbackRate = speed;
}

</script>

</body>
</html>
